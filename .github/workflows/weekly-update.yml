name: Weekly AI Tool Update

on:
  schedule:
    - cron: '0 17 * * 1'
  workflow_dispatch:

jobs:
  discover-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests
      - run: python scripts/weekly_update.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - run: |
          git config --local user.email "bot@ammonai.ai"
          git config --local user.name "AMMONAI Bot"
          git add data/
          git diff --staged --quiet || git commit -m "Weekly update $(date +'%Y-%m-%d')"
          git push
